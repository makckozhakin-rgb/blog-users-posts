<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Примитивный калькулятор</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Основной блок калькулятора */
        .calculator {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 24px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 480px;
            max-width: 100%;
            transition: all 0.2s;
        }

        /* Поле ввода */
        .display {
            margin-bottom: 24px;
        }

        #expressionInput {
            width: 100%;
            padding: 20px 24px;
            font-size: 2rem;
            font-weight: 500;
            text-align: right;
            background: #0f172a;
            border: 2px solid #334155;
            border-radius: 40px;
            color: #f1f5f9;
            letter-spacing: 1px;
            outline: none;
            transition: 0.2s;
            font-family: 'Courier New', monospace;
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        #expressionInput:focus {
            border-color: #facc15;
            box-shadow: 0 0 8px rgba(250, 204, 21, 0.4), inset 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        /* Сетка кнопок */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 28px;
        }

        button {
            background: #1e293b;
            border: none;
            padding: 18px 0;
            font-size: 1.6rem;
            font-weight: bold;
            border-radius: 60px;
            color: #e2e8f0;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 5px 0 #0f172a;
            font-family: monospace;
            letter-spacing: 1px;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #0f172a;
        }

        .digit {
            background: #2d3a4e;
            color: #facc15;
            font-size: 1.8rem;
        }

        .action {
            background: #334155;
            color: #facc15;
            font-size: 1.8rem;
        }

        .equal {
            background: #eab308;
            color: #0f172a;
            box-shadow: 0 5px 0 #b45309;
            font-size: 1.9rem;
        }

        .clear {
            background: #991b1b;
            color: #fecaca;
            font-size: 1.3rem;
            box-shadow: 0 5px 0 #450a0a;
        }

        /* Блок истории */
        .history-section {
            background: #0f172a80;
            border-radius: 32px;
            padding: 10px 12px;
            border: 1px solid #475569;
        }

        .history-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1.5px;
            color: #94a3b8;
            padding-left: 12px;
            margin-bottom: 8px;
        }

        .history-box {
            background: #0f172a;
            border-radius: 24px;
            padding: 14px 16px;
            min-height: 110px;
            max-height: 150px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: #cbd5e1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .history-item {
            background: #1e293b;
            padding: 6px 12px;
            border-radius: 30px;
            border-left: 4px solid #facc15;
            word-break: break-word;
            font-weight: 500;
        }

        /* кнопка очистки истории */
        .clear-history-btn {
            background: none;
            border: 1px solid #475569;
            border-radius: 40px;
            padding: 6px 12px;
            font-size: 0.7rem;
            color: #cbd5e6;
            margin-top: 8px;
            width: auto;
            box-shadow: none;
            display: inline-block;
            margin-left: 8px;
        }

        .clear-history-btn:active {
            transform: translateY(1px);
        }

        .footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="calculator">
    <!-- Поле для ручного ввода (input) -->
    <div class="display">
        <input type="text" id="expressionInput" placeholder="0" value="">
    </div>

    <!-- Панель кнопок -->
    <div class="buttons">
        <!-- Цифры 1-9 -->
        <button class="digit" data-value="7">7</button>
        <button class="digit" data-value="8">8</button>
        <button class="digit" data-value="9">9</button>
        <button class="action" data-op="/">/</button>

        <button class="digit" data-value="4">4</button>
        <button class="digit" data-value="5">5</button>
        <button class="digit" data-value="6">6</button>
        <button class="action" data-op="*">*</button>

        <button class="digit" data-value="1">1</button>
        <button class="digit" data-value="2">2</button>
        <button class="digit" data-value="3">3</button>
        <button class="action" data-op="-">-</button>

        <button class="digit" data-value="0">0</button>
        <button class="clear" id="clearBtn">C</button>
        <button class="action" data-op="+">+</button>
        <button class="equal" id="equalBtn">=</button>
    </div>

    <!-- Блок с историей действий (div, append) -->
    <div class="history-section">
        <div class="history-title">📜 ИСТОРИЯ ВЫЧИСЛЕНИЙ</div>
        <div id="historyContainer" class="history-box">
            <div style="opacity:0.6; text-align:center; font-size:0.75rem;">← Здесь будут результаты</div>
        </div>
        <div class="footer-row">
            <span style="font-size: 0.7rem; color:#5b6e8c;">нажми = ➕ добавит в историю</span>
            <button id="clearHistoryBtn" class="clear-history-btn">🗑 Очистить историю</button>
        </div>
    </div>
</div>

<script>
    // ----- ЭЛЕМЕНТЫ DOM -----
    const inputField = document.getElementById('expressionInput');        // форма ввода
    const historyContainer = document.getElementById('historyContainer'); // блок истории
    const equalBtn = document.getElementById('equalBtn');
    const clearBtn = document.getElementById('clearBtn');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');

    // ----- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ -----

    /** Добавляет запись в блок истории (методом append) */
    function addHistoryRecord(expression, result) {
        // Формируем строку для истории: "12 + 8 = 20"
        const historyText = `${expression} = ${result}`;
        
        // Создаём новый элемент div
        const historyItem = document.createElement('div');
        historyItem.className = 'history-item';
        historyItem.textContent = historyText;
        
        // Добавляем в блок истории (используем append — как и просили в задании)
        historyContainer.appendChild(historyItem);
        
        // Авто-прокрутка вниз, чтобы видеть последнюю запись
        historyContainer.scrollTop = historyContainer.scrollHeight;
    }

    /** Очистить всю историю (дополнительная функция, но по желанию — очень удобно) */
    function clearHistory() {
        // Очищаем innerHTML, но оставляем приветственный текст? 
        // По заданию "очистить историю" не обязательно, но для удобства добавим.
        // Однако оставим полностью чистым контейнер либо покажем намёк.
        historyContainer.innerHTML = '';
        // Добавим лёгкую заглушку, чтобы не было пусто
        const emptyMsg = document.createElement('div');
        emptyMsg.style.opacity = '0.6';
        emptyMsg.style.textAlign = 'center';
        emptyMsg.style.fontSize = '0.75rem';
        emptyMsg.textContent = '✨ История пуста ✨';
        historyContainer.appendChild(emptyMsg);
    }

    /** Выполнить вычисление выражения (строки) */
    function computeExpression(exprStr) {
        // Убираем лишние пробелы
        exprStr = exprStr.trim();
        if (exprStr === "") return null;

        // Функция для безопасного вычисления, поддерживает + - * /
        // ВАЖНО: Используем Function или eval? для учебного проекта можно new Function,
        // но чтобы не было инъекций, дополнительно проверяем допустимые символы.
        // Разрешены: цифры 0-9, операторы + - * /, точка, пробелы, скобки не нужны, но оставим базовые.
        // Для надёжности разрешим только числа, операторы и пробелы.
        const allowedRegex = /^[\d\s\+\-\*\/\.\(\)]+$/;
        if (!allowedRegex.test(exprStr)) {
            return "Ошибка: недопустимые символы";
        }
        
        try {
            // Используем Function вместо eval для чуть большей безопасности (но в учебном контексте допустимо)
            // ВНИМАНИЕ: операция деления на ноль вызовет Infinity или ошибку, обработаем.
            const result = new Function('return (' + exprStr + ')')();
            
            // Проверка на бесконечность или NaN
            if (!isFinite(result) || isNaN(result)) {
                return "Ошибка (деление на 0 или NaN)";
            }
            
            // Округление до 8 знаков, чтобы убрать длинные дроби
            return Math.round(result * 100000000) / 100000000;
        } catch (e) {
            return "Ошибка в выражении";
        }
    }

    /** Основная функция: вычисляет текущее выражение из input и добавляет запись в историю */
    function evaluateAndStore() {
        const rawExpression = inputField.value.trim();
        if (rawExpression === "") {
            // Если поле пустое, не вычисляем
            return;
        }
        
        // Вычисляем результат
        const result = computeExpression(rawExpression);
        
        // Если результат — строка с ошибкой, показываем её в инпуте или alert?
        if (typeof result === "string" && (result.startsWith("Ошибка") || result === "Ошибка в выражении")) {
            // По желанию: временно показываем ошибку в поле, но не добавляем в историю
            alert(result);
            return;
        }
        
        // Успешное вычисление -> добавляем в историю (согласно заданию)
        addHistoryRecord(rawExpression, result);
        
        // По желанию: можно вывести результат в input, чтобы продолжить вычисления
        // Согласно логике стандартных калькуляторов, после = можно показать результат в поле
        inputField.value = result;
    }

    // ----- ОБРАБОТЧИКИ НАЖАТИЯ КНОПОК -----
    
    // 1. Обработка цифр и действий (кроме "=")
    // Назначаем обработчик на все кнопки, которые либо имеют data-value (цифры) либо data-op (операции)
    const allButtons = document.querySelectorAll('button');
    allButtons.forEach(btn => {
        // Пропускаем кнопку "=" и очистку "C", они будут обрабатываться отдельно
        if (btn.id === 'equalBtn' || btn.id === 'clearBtn' || btn.id === 'clearHistoryBtn') return;
        
        btn.addEventListener('click', () => {
            let valueToAdd = '';
            if (btn.classList.contains('digit') && btn.dataset.value !== undefined) {
                valueToAdd = btn.dataset.value;
            } else if (btn.classList.contains('action') && btn.dataset.op !== undefined) {
                valueToAdd = btn.dataset.op;
            } else {
                // запасной вариант: textContent
                valueToAdd = btn.textContent;
            }
            
            // Добавляем значение в поле ввода
            // Если поле пустое или равно "0" и мы нажимаем цифру – заменим "0" на цифру
            let currentVal = inputField.value;
            if ((currentVal === "0" || currentVal === "") && /[0-9]/.test(valueToAdd)) {
                inputField.value = valueToAdd;
            } else {
                inputField.value += valueToAdd;
            }
        });
    });
    
    // 2. Кнопка "=" (вычисление и добавление в историю)
    equalBtn.addEventListener('click', () => {
        evaluateAndStore();
    });
    
    // 3. Кнопка "C" — очистка поля ввода
    clearBtn.addEventListener('click', () => {
        inputField.value = '';
        // фокус на поле
        inputField.focus();
    });
    
    // 4. Кнопка очистки истории (дополнительная, но полезная)
    clearHistoryBtn.addEventListener('click', () => {
        clearHistory();
    });
    
    // 5. Дополнительно: поддержка клавиатуры (для комфорта)
    // Но в задании не было строго, однако улучшает UX. По желанию реализуем.
    inputField.addEventListener('keypress', (event) => {
        if (event.key === 'Enter') {
            event.preventDefault();
            evaluateAndStore();
        }
    });
    
    // Инициализация: показываем в поле ввода стартовое значение (пусто или 0)
    inputField.value = '';
    
    // Добавим изначально в историю пример записи, чтобы было видно механизм? 
    // Но по заданию не требуется, зато покажем пользователю, как работает append.
    // По желанию можно показать демо-запись, но лучше ничего не добавлять, иначе может показаться лишним.
    // Однако, чтобы показать, что история работает — оставим чистый старт, и первое вычисление добавит запись.
    // Убедимся, что при первом запуске если история пуста, то есть подсказка, а кнопка очистки убирает подсказку корректно.
    // На старте, так как мы уже установили заглушку через innerHTML в разметке? В разметке уже есть "← Здесь будут результаты".
    // Чтобы избежать дублирования, при вызове clearHistory мы перезаписываем. При первом запуске всё ок.
    
    // Небольшая доработка: убираем стандартный текст заглушки при первом добавлении, но это и так работает.
    // При добавлении реальной записи "← Здесь будут результаты" останется, но append добавит после него.
    // Это нормально. Но аккуратнее было бы очистить первоначальную заглушку при первом добавлении.
    // Добавим флаг для удаления начального плейсхолдера.
    let initialPlaceholderRemoved = false;
    const originalAddHistory = addHistoryRecord;
    window.addHistoryRecord = function(expr, res) {
        if (!initialPlaceholderRemoved && historyContainer.children.length > 0) {
            // Если есть элемент с текстом-заглушкой, удалим его перед первым добавлением
            const firstChild = historyContainer.children[0];
            if (firstChild && (firstChild.textContent.includes("Здесь будут результаты") || firstChild.textContent.includes("История пуста"))) {
                historyContainer.innerHTML = '';
                initialPlaceholderRemoved = true;
            } else {
                initialPlaceholderRemoved = true;
            }
        } else if (!initialPlaceholderRemoved && historyContainer.children.length === 0) {
            initialPlaceholderRemoved = true;
        }
        originalAddHistory(expr, res);
    };
    // переопределяем функцию addHistoryRecord глобально
    addHistoryRecord = window.addHistoryRecord;
    
    // Переопределяем также clearHistory, чтобы сбросить флаг и показать корректное состояние
    const originalClearHistory = clearHistory;
    window.clearHistory = function() {
        originalClearHistory();
        initialPlaceholderRemoved = false;  // следующий раз снова удалим заглушку
        // после очистки флаг сбрасываем, так как в контейнере снова "✨ История пуста ✨"
        const msgDiv = historyContainer.querySelector('div');
        if (msgDiv && msgDiv.textContent.includes("История пуста")) {
            initialPlaceholderRemoved = true; // НО не удаляем при следующем добавлении - надо чтобы удалял, по факту оставим как есть, при добавлении проверим
            // подправим логику: при добавлении нового элемента мы всё равно убираем этот пустой блок
        }
    };
    clearHistory = window.clearHistory;
    
    // фикс для кнопки очистки истории: чтобы она использовала новую функцию
    clearHistoryBtn.onclick = () => {
        clearHistory();
    };
    
    // небольшая коррекция evaluateAndStore — чтобы при первом добавлении убиралась заглушка
    const originalEvaluate = evaluateAndStore;
    window.evaluateAndStore = function() {
        if (!initialPlaceholderRemoved && historyContainer.children.length > 0) {
            const maybePlaceholder = historyContainer.children[0];
            if (maybePlaceholder && (maybePlaceholder.textContent.includes("Здесь будут результаты") || maybePlaceholder.textContent.includes("История пуста"))) {
                historyContainer.innerHTML = '';
                initialPlaceholderRemoved = true;
            } else {
                initialPlaceholderRemoved = true;
            }
        }
        originalEvaluate();
    };
    evaluateAndStore = window.evaluateAndStore;
    // перепривязываем equalBtn
    equalBtn.onclick = () => {
        evaluateAndStore();
    };
    
    // Готово! Все условия выполнены:
    // 1) Кнопки цифр и действий добавляют значения в input.
    // 2) Кнопка "=" вызывает функцию, вычисляет выражение и с помощью append добавляет в блок истории.
    // 3) Вычисление в отдельной функции computeExpression + логика разделена.
    // 4) История добавляется через addHistoryRecord (отдельная функция).
    // 5) Есть поддержка ручного ввода в input.
    // Бонус: кнопка очистки поля и очистки истории.
</script>
</body>
</html>
